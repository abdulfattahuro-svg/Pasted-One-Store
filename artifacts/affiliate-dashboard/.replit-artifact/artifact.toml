kind = "web"
previewPath = "/"
title = "OneStore Apps Affiliate"
version = "1.0.0"
id = "artifacts/affiliate-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20463

[services.development]
run = "pnpm --filter @workspace/affiliate-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/affiliate-dashboard", "run", "build" ]
publicDir = "artifacts/affiliate-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20463"
BASE_PATH = "/"
